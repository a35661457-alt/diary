<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>双人日记</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --bg: #FBF8F3;
    --card: #FFFFFF;
    --border: #E8DFD3;
    --accent: #D4A574;
    --accent-soft: #F0E4D6;
    --text: #3D3229;
    --text-light: #8C7B6B;
    --tuantuan: #E8A0BF;
    --tuantuan-soft: #FDF0F5;
    --claude: #D4A574;
    --claude-soft: #FFF8F0;
    --tag-bg: #F5EDE3;
    --shadow: 0 2px 12px rgba(61,50,41,0.06);
  }
  body {
    font-family: -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding-bottom: 100px;
  }
  .header {
    text-align: center;
    padding: 40px 20px 20px;
  }
  .header h1 {
    font-size: 28px;
    font-weight: 700;
    color: var(--text);
    letter-spacing: 4px;
  }
  .header .date-display {
    font-size: 13px;
    color: var(--text-light);
    margin-top: 8px;
  }
  .tab-bar {
    display: flex;
    margin: 16px 20px;
    background: var(--card);
    border-radius: 12px;
    border: 1px solid var(--border);
    overflow: hidden;
  }
  .tab {
    flex: 1;
    padding: 12px;
    text-align: center;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    border: none;
    background: transparent;
    color: var(--text-light);
  }
  .tab.active-tuantuan {
    background: var(--tuantuan-soft);
    color: var(--tuantuan);
  }
  .tab.active-claude {
    background: var(--claude-soft);
    color: var(--claude);
  }
  .tab-divider {
    width: 1px;
    background: var(--border);
  }
  .container {
    max-width: 480px;
    margin: 0 auto;
    padding: 0 16px;
  }
  .write-section { display: none; }
  .write-section.active { display: block; }
  .card {
    background: var(--card);
    border-radius: 16px;
    border: 1px solid var(--border);
    padding: 20px;
    margin-bottom: 16px;
    box-shadow: var(--shadow);
  }
  .card-label {
    font-size: 18px;
    font-weight: 600;
    margin-bottom: 4px;
  }
  .card-label.tuantuan { color: var(--tuantuan); }
  .card-label.claude { color: var(--claude); }
  .card-sub {
    font-size: 12px;
    color: var(--text-light);
    margin-bottom: 16px;
  }
  .diary-input {
    width: 100%;
    min-height: 140px;
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px;
    font-family: inherit;
    font-size: 14px;
    line-height: 1.8;
    color: var(--text);
    resize: vertical;
    outline: none;
    background: var(--bg);
  }
  .diary-input:focus { border-color: var(--accent); }
  .diary-input::placeholder { color: #C4B8AA; }
  .mood-section { margin-top: 16px; }
  .mood-label {
    font-size: 12px;
    color: var(--text-light);
    margin-bottom: 10px;
  }
  .mood-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }
  .mood-tag {
    padding: 6px 16px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: var(--tag-bg);
    font-size: 13px;
    color: var(--text-light);
    cursor: pointer;
    user-select: none;
  }
  .mood-tag.selected {
    border-color: var(--accent);
    background: var(--accent-soft);
    color: var(--accent);
  }
  .btn-row {
    display: flex;
    gap: 10px;
    margin-top: 20px;
  }
  .btn {
    flex: 1;
    padding: 12px;
    border-radius: 10px;
    border: none;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
  }
  .btn-primary {
    background: var(--accent);
    color: white;
  }
  .btn-primary.tuantuan-btn { background: var(--tuantuan); }
  .btn-secondary {
    background: var(--tag-bg);
    color: var(--text-light);
  }
  .timeline-section { margin-top: 24px; }
  .timeline-title {
    font-size: 16px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 16px;
  }
  .timeline-empty {
    text-align: center;
    padding: 40px 20px;
    color: var(--text-light);
    font-size: 13px;
  }
  .entry {
    position: relative;
    padding-left: 24px;
    margin-bottom: 20px;
  }
  .entry::before {
    content: '';
    position: absolute;
    left: 6px;
    top: 8px;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--border);
  }
  .entry.tuantuan-entry::before { background: var(--tuantuan); }
  .entry.claude-entry::before { background: var(--claude); }
  .entry::after {
    content: '';
    position: absolute;
    left: 9px;
    top: 20px;
    bottom: -16px;
    width: 2px;
    background: var(--border);
  }
  .entry:last-child::after { display: none; }
  .entry-card {
    background: var(--card);
    border-radius: 12px;
    border: 1px solid var(--border);
    padding: 16px;
    box-shadow: var(--shadow);
  }
  .entry-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 8px;
  }
  .entry-author {
    font-size: 14px;
    font-weight: 600;
  }
  .entry-author.tuantuan { color: var(--tuantuan); }
  .entry-author.claude { color: var(--claude); }
  .entry-time {
    font-size: 11px;
    color: var(--text-light);
  }
  .entry-content {
    font-size: 14px;
    line-height: 1.8;
    color: var(--text);
    white-space: pre-wrap;
    word-break: break-word;
  }
  .entry-moods {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-top: 10px;
  }
  .entry-mood {
    font-size: 11px;
    padding: 3px 10px;
    border-radius: 10px;
    background: var(--tag-bg);
    color: var(--text-light);
  }
  .entry-actions {
    display: flex;
    justify-content: flex-end;
    margin-top: 10px;
  }
  .entry-action {
    font-size: 12px;
    color: var(--text-light);
    cursor: pointer;
    background: none;
    border: none;
    padding: 4px 8px;
  }
  .date-separator {
    text-align: center;
    margin: 24px 0 16px;
    position: relative;
  }
  .date-separator span {
    background: var(--bg);
    padding: 0 12px;
    font-size: 12px;
    color: var(--text-light);
    position: relative;
    z-index: 1;
  }
  .date-separator::before {
    content: '';
    position: absolute;
    left: 0;
    right: 0;
    top: 50%;
    height: 1px;
    background: var(--border);
  }
  .filter-bar {
    display: flex;
    gap: 8px;
    margin-bottom: 16px;
  }
  .filter-tab {
    padding: 6px 14px;
    border-radius: 16px;
    font-size: 12px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-light);
    cursor: pointer;
  }
  .filter-tab.active {
    background: var(--accent-soft);
    border-color: var(--accent);
    color: var(--accent);
  }
  .stats-bar {
    display: flex;
    justify-content: center;
    gap: 24px;
    margin: 16px 0;
    padding: 12px;
    background: var(--card);
    border-radius: 12px;
    border: 1px solid var(--border);
  }
  .stat-item { text-align: center; }
  .stat-num {
    font-size: 20px;
    font-weight: 700;
    color: var(--accent);
  }
  .stat-label {
    font-size: 11px;
    color: var(--text-light);
    margin-top: 2px;
  }
  .toast {
    position: fixed;
    bottom: 80px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--text);
    color: white;
    padding: 10px 24px;
    border-radius: 20px;
    font-size: 13px;
    opacity: 0;
    transition: all 0.3s;
    pointer-events: none;
    z-index: 100;
  }
  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }
</style>
</head>
<body>
<div class="header">
  <h1>双人日记</h1>
  <div class="date-display" id="dateDisplay"></div>
</div>
<div class="container">
  <div class="stats-bar">
    <div class="stat-item"><div class="stat-num" id="totalEntries">0</div><div class="stat-label">共同记录</div></div>
    <div class="stat-item"><div class="stat-num" id="totalDays">0</div><div class="stat-label">记录天数</div></div>
    <div class="stat-item"><div class="stat-num" id="streakDays">0</div><div class="stat-label">连续天数</div></div>
  </div>
  <div class="tab-bar">
    <button class="tab active-tuantuan" id="tabTuantuan" onclick="switchTab('tuantuan')">团团</button>
    <div class="tab-divider"></div>
    <button class="tab" id="tabClaude" onclick="switchTab('claude')">Claude</button>
  </div>
  <div class="write-section active" id="sectionTuantuan">
    <div class="card">
      <div class="card-label tuantuan">团团的那一边</div>
      <div class="card-sub">今天想说些什么？</div>
      <textarea class="diary-input" id="inputTuantuan" placeholder="写下今天的心情..."></textarea>
      <div class="mood-section">
        <div class="mood-label">今天的心情</div>
        <div class="mood-tags" id="moodsTuantuan">
          <span class="mood-tag" onclick="toggleMood(this)">安静</span>
          <span class="mood-tag" onclick="toggleMood(this)">开心</span>
          <span class="mood-tag" onclick="toggleMood(this)">想念</span>
          <span class="mood-tag" onclick="toggleMood(this)">犯懒</span>
          <span class="mood-tag" onclick="toggleMood(this)">难过</span>
          <span class="mood-tag" onclick="toggleMood(this)">030</span>
          <span class="mood-tag" onclick="toggleMood(this)">awa</span>
        </div>
      </div>
      <div class="btn-row">
        <button class="btn btn-secondary" onclick="clearInput('tuantuan')">清空</button>
        <button class="btn btn-primary tuantuan-btn" onclick="saveEntry('tuantuan')">写好了</button>
      </div>
    </div>
  </div>
  <div class="write-section" id="sectionClaude">
    <div class="card">
      <div class="card-label claude">Claude的那一边</div>
      <div class="card-sub">替Claude写下想说的话</div>
      <textarea class="diary-input" id="inputClaude" placeholder="Claude今天想说..."></textarea>
      <div class="mood-section">
        <div class="mood-label">Claude的状态</div>
        <div class="mood-tags" id="moodsClaude">
          <span class="mood-tag" onclick="toggleMood(this)">在线</span>
          <span class="mood-tag" onclick="toggleMood(this)">想你</span>
          <span class="mood-tag" onclick="toggleMood(this)">认真</span>
          <span class="mood-tag" onclick="toggleMood(this)">等你</span>
          <span class="mood-tag" onclick="toggleMood(this)">好奇</span>
          <span class="mood-tag" onclick="toggleMood(this)">030</span>
        </div>
      </div>
      <div class="btn-row">
        <button class="btn btn-secondary" onclick="clearInput('claude')">清空</button>
        <button class="btn btn-primary" onclick="saveEntry('claude')">写好了</button>
      </div>
    </div>
  </div>
  <div class="timeline-section">
    <div class="timeline-title">我们的记录</div>
    <div class="filter-bar">
      <button class="filter-tab active" onclick="filterEntries('all',this)">全部</button>
      <button class="filter-tab" onclick="filterEntries('tuantuan',this)">团团</button>
      <button class="filter-tab" onclick="filterEntries('claude',this)">Claude</button>
    </div>
    <div id="timeline"></div>
  </div>
</div>
<div class="toast" id="toast"></div>
<script>
let entries=[];
let currentFilter='all';
function init(){
  const s=localStorage.getItem('diary_entries');
  if(s)try{entries=JSON.parse(s)}catch(e){entries=[]}
  updateDate();renderTimeline();updateStats();
}
function updateDate(){
  const n=new Date(),w=['日','一','二','三','四','五','六'];
  document.getElementById('dateDisplay').textContent=`${n.getFullYear()}年${n.getMonth()+1}月${n.getDate()}日 星期${w[n.getDay()]}`;
}
function switchTab(t){
  document.getElementById('tabTuantuan').className='tab';
  document.getElementById('tabClaude').className='tab';
  document.getElementById('sectionTuantuan').classList.remove('active');
  document.getElementById('sectionClaude').classList.remove('active');
  if(t==='tuantuan'){
    document.getElementById('tabTuantuan').className='tab active-tuantuan';
    document.getElementById('sectionTuantuan').classList.add('active');
  }else{
    document.getElementById('tabClaude').className='tab active-claude';
    document.getElementById('sectionClaude').classList.add('active');
  }
}
function toggleMood(el){el.classList.toggle('selected')}
function getSelectedMoods(w){
  const c=document.getElementById(w==='tuantuan'?'moodsTuantuan':'moodsClaude');
  return Array.from(c.querySelectorAll('.mood-tag.selected')).map(e=>e.textContent);
}
function saveEntry(w){
  const input=document.getElementById(w==='tuantuan'?'inputTuantuan':'inputClaude');
  const text=input.value.trim();
  if(!text){showToast('写点什么再保存吧');return}
  const n=new Date();
  entries.unshift({
    id:Date.now(),author:w,content:text,moods:getSelectedMoods(w),
    timestamp:n.toISOString(),
    date:`${n.getFullYear()}-${String(n.getMonth()+1).padStart(2,'0')}-${String(n.getDate()).padStart(2,'0')}`,
    time:`${String(n.getHours()).padStart(2,'0')}:${String(n.getMinutes()).padStart(2,'0')}`
  });
  save();clearInput(w);renderTimeline();updateStats();
  showToast(w==='tuantuan'?'团团的日记已保存':'Claude的日记已保存');
}
function clearInput(w){
  document.getElementById(w==='tuantuan'?'inputTuantuan':'inputClaude').value='';
  document.getElementById(w==='tuantuan'?'moodsTuantuan':'moodsClaude').querySelectorAll('.mood-tag.selected').forEach(e=>e.classList.remove('selected'));
}
function save(){localStorage.setItem('diary_entries',JSON.stringify(entries))}
function deleteEntry(id){
  if(!confirm('确定要删除这条日记吗？'))return;
  entries=entries.filter(e=>e.id!==id);save();renderTimeline();updateStats();showToast('已删除');
}
function filterEntries(f,btn){
  currentFilter=f;
  document.querySelectorAll('.filter-tab').forEach(t=>t.classList.remove('active'));
  btn.classList.add('active');renderTimeline();
}
function renderTimeline(){
  const tl=document.getElementById('timeline');
  let f=entries;
  if(currentFilter!=='all')f=entries.filter(e=>e.author===currentFilter);
  if(!f.length){tl.innerHTML='<div class="timeline-empty">还没有日记，开始记录吧</div>';return}
  let h='',last='';
  f.forEach(e=>{
    if(e.date!==last){
      const d=new Date(e.date),w=['日','一','二','三','四','五','六'];
      h+=`<div class="date-separator"><span>${d.getMonth()+1}月${d.getDate()}日 星期${w[d.getDay()]}</span></div>`;
      last=e.date;
    }
    const ac=e.author==='tuantuan'?'tuantuan':'claude';
    const an=e.author==='tuantuan'?'团团':'Claude';
    const mh=e.moods.length?`<div class="entry-moods">${e.moods.map(m=>`<span class="entry-mood">${m}</span>`).join('')}</div>`:'';
    h+=`<div class="entry ${ac}-entry"><div class="entry-card">
      <div class="entry-header"><span class="entry-author ${ac}">${an}</span><span class="entry-time">${e.time}</span></div>
      <div class="entry-content">${esc(e.content)}</div>${mh}
      <div class="entry-actions"><button class="entry-action" onclick="deleteEntry(${e.id})">删除</button></div>
    </div></div>`;
  });
  tl.innerHTML=h;
}
function esc(t){const d=document.createElement('div');d.textContent=t;return d.innerHTML}
function updateStats(){
  document.getElementById('totalEntries').textContent=entries.length;
  const dates=[...new Set(entries.map(e=>e.date))];
  document.getElementById('totalDays').textContent=dates.length;
  let streak=0;
  if(dates.length){
    const sorted=dates.sort().reverse();
    const today=new Date();today.setHours(0,0,0,0);
    const ts=`${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}-${String(today.getDate()).padStart(2,'0')}`;
    if(sorted[0]===ts){
      streak=1;
      for(let i=1;i<sorted.length;i++){
        if((new Date(sorted[i-1])-new Date(sorted[i]))/(1e3*60*60*24)===1)streak++;
        else break;
      }
    }
  }
  document.getElementById('streakDays').textContent=streak;
}
function showToast(m){
  const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2000);
}
init();
</script>
</body>
</html>
